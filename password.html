<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | VEXAIRE</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>   
        .password-fields { display: none; }
    </style>
    <link rel="icon" type="image/jpg" href="939B0C6F-46E1-40B0-B658-803C40F01E1D.png" width="500" height="500">
</head>
<body>
    <div class="wrapper"> 
        <form id="resetForm">
            <h1 id="mainTitle">Reset Password</h1>
            <p id="infoText" style="text-align: center; margin-bottom: 20px;">
                Enter email to reset your password
            </p>
            
            <div class="input-box email-field">
                <input type="email" id="emailInput" placeholder="Email" required>
                <i class='bx bxs-envelope'></i>
            </div>

            <div class="input-box password-fields">
    <input type="password" id="newPass" placeholder="New Password" minlength="7">
    <i class='bx bx-hide toggle-password' style="cursor: pointer;"></i>
</div>
<div class="input-box password-fields">
    <input type="password" id="confirmPass" placeholder="Confirm New Password" minlength="7">
    <i class='bx bx-hide toggle-password' style="cursor: pointer;"></i>
</div>

            <button type="submit" id="actionBtn" class="btn">Verify Email</button>

            <div class="register-link">
                 <p><a href="login.html">Back to login</a></p>
            </div>
       </form>
    </div>

    <script>

// Kod för att visa/dölja båda lösenorden i Reset Password
document.querySelectorAll('.toggle-password').forEach(icon => {
    icon.addEventListener('click', function() {
        const input = this.parentElement.querySelector('input');
        const isPassword = input.type === 'password';
        
        input.type = isPassword ? 'text' : 'password';
        this.classList.toggle('bx-show');
        this.classList.toggle('bx-hide');
    });
});

        const resetForm = document.getElementById('resetForm');
        const emailField = document.querySelector('.email-field');
        const passwordFields = document.querySelectorAll('.password-fields');
        const actionBtn = document.getElementById('actionBtn');
        const infoText = document.getElementById('infoText');
        const mainTitle = document.getElementById('mainTitle');

        let currentStep = 1; // Håller koll på om vi är i steg 1 eller 2

        resetForm.addEventListener('submit', (e) => {
            e.preventDefault();

            if (currentStep === 1) {
                // --- STEG 1: Kontrollera om emailen finns ---
                const inputEmail = document.getElementById('emailInput').value;
                const savedEmail = localStorage.getItem('registeredEmail');

                if (inputEmail === savedEmail) {
                    // Om rätt email: Byt till steg 2
                    currentStep = 2;
                    emailField.style.display = 'none'; // Dölj email-rutan
                    passwordFields.forEach(f => f.style.display = 'block'); // Visa lösenordsrutor
                    
                    mainTitle.innerText = "New Password";
                    infoText.innerText = "Choose a strong password";
                    actionBtn.innerText = "Update Password";
                } else {
                    alert("Email not found. Make sure you typed it correctly!");
                }

            } else {
                // --- STEG 2: Spara det nya lösenordet ---
                const pass1 = document.getElementById('newPass').value;
                const pass2 = document.getElementById('confirmPass').value;

                if (pass1 === pass2) {
                    // Uppdatera lösenordet i LocalStorage
                    localStorage.setItem('registeredPass', pass1);
                    
                    window.location.href = "login.html";
                } else {
                    alert("Passwords do not match!");
                }
            }
        });
    </script>
</body>
</html>
